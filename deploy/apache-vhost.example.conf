<VirtualHost *:80>
    ServerName meisai-lab.gucchii.com
    ErrorLog ${APACHE_LOG_DIR}/meisai-lab.gucchii.com-error.log
    CustomLog ${APACHE_LOG_DIR}/meisai-lab.gucchii.com-access.log combined

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    ProxyPass / http://127.0.0.1:3106/
    ProxyPassReverse / http://127.0.0.1:3106/
</VirtualHost>

# :443 は certbot --apache 実行時に自動追記される（手動で書かない）
